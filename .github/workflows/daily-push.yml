name: Daily TAIFEX Push

on:
  schedule:
    # Start before the expected TAIFEX release and poll until today's data is ready.
    # 14:20 Asia/Taipei, Monday-Friday.
    - cron: "20 6 * * 1-5"
    # Backup trigger in case GitHub drops or heavily delays the first schedule.
    # 15:20 Asia/Taipei, Monday-Friday.
    - cron: "20 7 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-taifex-push
  cancel-in-progress: false

jobs:
  daily-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright==1.59.0
          python3 -m playwright install --with-deps chromium

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run daily push
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PUBLIC_BASE_URL: https://taifex-report-dashboard.onrender.com
          REPORT_MAX_RETRIES: "90"
          REPORT_RETRY_DELAY_SECONDS: "120"
        run: python3 send_daily_push.py | tee daily-push-result.json

      - name: Upload daily push result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-push-result
          path: daily-push-result.json
          if-no-files-found: warn

      - name: Alert Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import os, urllib.parse, urllib.request
          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          run_url = os.environ["RUN_URL"]
          text = f"TAIFEX Daily Push 失敗\\n請檢查 GitHub Actions：{run_url}"
          data = urllib.parse.urlencode({"chat_id": chat_id, "text": text}).encode()
          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=data,
              headers={"Content-Type": "application/x-www-form-urlencoded"},
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              resp.read()
          PY
