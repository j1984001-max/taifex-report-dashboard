name: TAIFEX High-Low Watchdog

on:
  schedule:
    # Asia/Taipei: 15:34, 16:04, 16:34, 17:04, 17:34.
    # If the fast push schedule or external trigger misses, this checks delivery
    # state and dispatches the fast workflow only when today's high-low card is absent.
    - cron: "34 7 * * 1-5"
    - cron: "4,34 8 * * 1-5"
    - cron: "4,34 9 * * 1-5"
  workflow_dispatch:

concurrency:
  group: taifex-high-low-watchdog
  cancel-in-progress: true

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read

    steps:
      - name: Check and dispatch high-low push
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import urllib.error
          import urllib.request
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo

          holidays = {
              "2026/01/01", "2026/02/16", "2026/02/17", "2026/02/18", "2026/02/19",
              "2026/02/20", "2026/02/27", "2026/04/03", "2026/04/06", "2026/05/01",
              "2026/06/19", "2026/09/25", "2026/10/09",
          }

          current = datetime.now(ZoneInfo("Asia/Taipei"))
          while current.weekday() >= 5 or current.strftime("%Y/%m/%d") in holidays:
              current -= timedelta(days=1)
          expected = current.strftime("%Y/%m/%d")
          slug = expected.replace("/", "-")
          repo = os.environ["GITHUB_REPOSITORY"]

          def fetch_json(url: str) -> dict | None:
              req = urllib.request.Request(
                  url,
                  headers={"Cache-Control": "no-cache", "Pragma": "no-cache", "User-Agent": "Mozilla/5.0"},
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      return json.loads(resp.read().decode("utf-8", "ignore"))
              except urllib.error.HTTPError as exc:
                  if exc.code == 404:
                      return None
                  raise

          delivery = fetch_json(f"https://raw.githubusercontent.com/{repo}/main/snapshots/{slug}.delivery.json")
          if delivery and delivery.get("date") == expected and delivery.get("highLowTelegram") is True:
              print(json.dumps({"status": "already_delivered", "date": expected, "delivery": delivery}, ensure_ascii=False))
              return

          runs_url = (
              f"https://api.github.com/repos/{repo}/actions/workflows/high-low-fast-push.yml/runs"
              "?branch=main&per_page=10"
          )
          runs = fetch_json(runs_url) or {}
          for run in runs.get("workflow_runs", []):
              if run.get("status") in {"queued", "in_progress", "waiting", "requested", "pending"}:
                  print(json.dumps({"status": "fast_push_already_running", "date": expected, "runId": run.get("id")}, ensure_ascii=False))
                  return

          subprocess.run(
              [
                  "gh", "workflow", "run", "high-low-fast-push.yml",
                  "--repo", repo,
                  "--ref", "main",
                  "-f", "trigger_reason=high-low-watchdog",
              ],
              check=True,
          )
          print(json.dumps({"status": "dispatched", "date": expected, "previousDelivery": delivery}, ensure_ascii=False))
          PY
